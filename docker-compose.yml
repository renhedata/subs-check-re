services:
  migrator:
    image: alpine:3.19
    command: ["sh", "/deploy/migrate.sh"]
    environment:
      DB_HOST: 10.0.10.114:5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./deploy:/deploy
      - ./services:/services
    restart: "no"

  nsq:
    image: nsqio/nsq:latest
    command: /nsqd
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4151/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: subs-check:latest
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      BASE_URL: ${BASE_URL}
    volumes:
      - ./deploy/infra.config.json:/etc/encore/infra-config.json
    depends_on:
      migrator:
        condition: service_completed_successfully
      nsq:
        condition: service_healthy
    restart: on-failure:5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      ENCORE_URL: http://backend:8080
    ports:
      - "18080:3000"
    depends_on:
      - backend
    restart: unless-stopped
