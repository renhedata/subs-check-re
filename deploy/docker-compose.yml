# Coolify deployment for the subs-check-re backend.
#
# Build the image ON THE COOLIFY HOST first (no registry / username required):
#   encore build docker --config deploy/infra.config.json subs-check:latest
#
# Then deploy this file as a Coolify "Docker Compose" resource and set
# DB_USER / DB_PASSWORD / JWT_SECRET in the Coolify environment variables.
#
# Postgres is EXTERNAL (see deploy/infra.config.json -> 10.0.10.114:5432).
# Create the 6 databases once before the first boot:
#   psql -h <host> -U <user> -f deploy/init.sql

services:
  nsq:
    image: nsqio/nsq:v1.3.0
    command: /nsqd --broadcast-address=nsq
    restart: unless-stopped

  backend:
    # Locally built image — no registry prefix, no username.
    image: subs-check:latest
    # Never pull from a registry; use the image built on this host.
    pull_policy: never
    restart: unless-stopped
    depends_on:
      - nsq
    environment:
      PORT: "8080"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "8080"
    # In the Coolify UI: set this service's domain to https://sub.rhzy.ai and
    # route /api -> :8080. Bump the proxy/Traefik read & idle timeouts — the
    # checker runs long jobs (up to 4h) and streams progress over SSE
    # (/check/:jobId/progress); the default timeout will cut those off.
