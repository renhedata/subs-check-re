services:
  subs-check:
    image: subs-check:latest
    environment:
      - PLAYWRIGHT_URL=http://playwright:3000
    depends_on:
      - playwright
    ports:
      - "8080:8080"

  playwright:
    build:
      context: ../playwright
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - MAX_CONCURRENT=5
      - DEFAULT_TIMEOUT=30000
    ports:
      - "3000:3000"
