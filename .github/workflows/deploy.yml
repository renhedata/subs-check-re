name: deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write          # required to push to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Encore CLI
        run: |
          curl -L https://encore.dev/install.sh | bash
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push backend image (Encore self-host)
        run: |
          IMG="${REGISTRY}/${{ github.repository }}"   # ghcr.io/renhedata/subs-check-re
          encore build docker --config deploy/infra.config.json "$IMG:${{ github.sha }}"
          docker push "$IMG:${{ github.sha }}"
          # On a tag push, publish the version tag (e.g. v0.1.0); on main, publish latest.
          if [ "${{ github.ref_type }}" = "tag" ]; then MOVING="${{ github.ref_name }}"; else MOVING="latest"; fi
          docker tag "$IMG:${{ github.sha }}" "$IMG:$MOVING"
          docker push "$IMG:$MOVING"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}-frontend:${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl --fail-with-body "${{ secrets.COOLIFY_WEBHOOK }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
